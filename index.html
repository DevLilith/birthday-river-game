<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#1a6b3a;min-height:100vh;overflow-x:hidden}
#game{width:100%;max-width:800px;margin:0 auto;padding:10px;position:relative}
h2{color:#fff;text-align:center;font-size:18px;font-weight:500;margin-bottom:6px}
#status{color:#ffe;text-align:center;font-size:14px;min-height:20px;margin-bottom:6px}
#chances{color:#ffd700;text-align:center;font-size:14px;margin-bottom:8px}

#scene{
  width:100%;
  height:60vh;       /* responsive height */
  max-height:420px;  /* prevents it getting too tall */
  min-height:260px;  /* prevents it getting too small */
  position:relative;
  border-radius:12px;
  overflow:hidden
}
.bank{position:absolute;top:0;bottom:0;width:30%;background:#8B6914}
#left-bank{left:0;border-radius:12px 0 0 12px}
#right-bank{right:0;border-radius:0 12px 12px 0}
.river{position:absolute;left:30%;right:30%;top:0;bottom:0;background:linear-gradient(180deg,#1e90ff 0%,#104a8e 100%)}
.wave{position:absolute;width:200%;height:20px;background:rgba(255,255,255,0.15);border-radius:50%;animation:wave 3s linear infinite}
@keyframes wave{from{left:-100%}to{left:0}}

#left-people{position:absolute;left:6px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:6px}
#right-people{position:absolute;right:6px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:6px;align-items:flex-end}
.person{display:flex;align-items:center;gap:4px;cursor:pointer;padding:8px 10px;border-radius:10px;transition:background 0.2s;user-select:none}
.person:hover{background:rgba(255,255,255,0.2)}
.person.selected{background:rgba(255,220,0,0.4);outline:2px solid gold}
.person.hidden{display:none!important}
.avatar{font-size:22px;line-height:1}
.pname{color:#fff;font-size:13px;font-weight:500}

.human-dancer{animation:dance 0.5s ease-in-out infinite alternate;display:inline-block}
@keyframes dance{from{transform:rotate(-10deg)}to{transform:rotate(10deg) translateY(-4px)}}

#boat{position:absolute;bottom:30px;width:90px;height:54px;transition:left 1s ease-in-out}
.boat-body{width:90px;height:36px;background:#c8860a;border-radius:0 0 40px 40px;border:2px solid #7a4e00}
.boat-top{width:70px;height:12px;background:#e8a020;border-radius:4px;margin:0 auto;margin-top:-6px}
#boat-people{position:absolute;top:-28px;left:0;width:100%;display:flex;justify-content:center;gap:2px}
.bp{font-size:15px;line-height:1}

.party-deco{position:absolute;top:8px;width:100%;text-align:center;font-size:13px}
.party-label{color:#ffe;font-size:11px;position:absolute;bottom:6px;width:100%;text-align:center}

#controls{margin-top:10px;display:flex;flex-direction:column;align-items:center;gap:8px}
.btn{padding:12px 20px;border-radius:8px;border:none;cursor:pointer;font-size:16px;font-weight:500;transition:all 0.15s}
.btn:active{transform:scale(0.97)}
#row-btns{display:flex;gap:10px}
#btn-go{background:#ffd700;color:#333}
#btn-go:disabled{background:#888;color:#ccc;cursor:default}
#btn-reset{background:rgba(255,255,255,0.2);color:#fff}
#selection-info{color:#ffe;font-size:13px;min-height:16px;text-align:center}

#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;flex-direction:column;align-items:center;justify-content:center}
#overlay.show{display:flex}
#overlay-box{background:#fff;border-radius:16px;padding:30px 40px;text-align:center;max-width:380px;width:90%}
#overlay-title{font-size:22px;font-weight:500;margin-bottom:10px}
#overlay-msg{font-size:14px;color:#555;margin-bottom:20px;line-height:1.5}
#overlay-btn{background:#1a6b3a;color:#fff;padding:10px 28px;border-radius:8px;border:none;cursor:pointer;font-size:15px}

#confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:99}
#win-banner{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:110;text-align:center;pointer-events:none;width:90%}
#win-banner.show{display:block}
#win-text{font-size:clamp(26px,6vw,50px);font-weight:500;color:#ffd700;text-shadow:0 2px 12px rgba(0,0,0,0.5);animation:pop 0.5s ease-out}
#win-sub{font-size:16px;color:#fff;margin-top:8px}
@keyframes pop{from{transform:scale(0.5);opacity:0}to{transform:scale(1);opacity:1}}
</style>
</head>
<body>
<div id="game">
  <h2>Get everyone to Human's party!</h2>
  <div id="status">Select passengers, then row across.</div>
  <div id="chances">Trips remaining: <span id="trip-count">5</span></div>

  <div id="scene">
    <div class="bank" id="left-bank">
      <div id="left-people"></div>
    </div>
    <div class="river">
      <div class="wave" style="top:30px"></div>
      <div class="wave" style="top:100px"></div>
      <div class="wave" style="top:160px"></div>
    </div>
    <div class="bank" id="right-bank">
      <div class="party-deco">🎉🎂🎈</div>
      <div id="right-people"></div>
      <div class="party-label">Human's Party</div>
    </div>
    <div id="boat">
      <div id="boat-people"></div>
      <div class="boat-top"></div>
      <div class="boat-body"></div>
    </div>
  </div>

  <div id="controls">
    <div id="selection-info">Select passengers to board the boat</div>
    <div id="row-btns">
      <button class="btn" id="btn-go" onclick="rowBoat()">Row across ⛵</button>
      <button class="btn" id="btn-reset" onclick="resetGame()">Restart</button>
    </div>
  </div>
</div>

<canvas id="confetti-canvas"></canvas>
<div id="win-banner">
  <div id="win-text">🎉 Happy Birthday Human! 🎉</div>
  <div id="win-sub">Everyone made it to the party!</div>
  <button class="btn" style="background:#ffd700;color:#333;margin-top:12px;pointer-events:all" onclick="resetGame()">Play Again</button>
</div>
<div id="overlay">
  <div id="overlay-box">
    <div id="overlay-title"></div>
    <div id="overlay-msg"></div>
    <button id="overlay-btn" class="btn" onclick="closeOverlay()">Try Again</button>
  </div>
</div>

<script>
const PEOPLE = {
  clue:  {name:'Clue',   emoji:'🕵️'},
  lilith:{name:'Lilith', emoji:'🧛'},
  demure:{name:'Demure', emoji:'🌸'},
  human: {name:'Human',  emoji:'🕺', dancer:true}
};

let state = {};

function initState(){
  state = {
    loc: {clue:'left', lilith:'left', demure:'left', human:'right'},
    boatSide: 'left',
    boatPassengers: [],
    tripsLeft: 5,
    moving: false
  };
}

function onBank(side){ return Object.keys(state.loc).filter(id => state.loc[id] === side); }
function resetGame(){
  // reset game state
  initState();

  // stop animations
  stopConfetti();

  // hide UI overlays
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('win-banner').classList.remove('show');

  // clear boat passengers visually (extra safety)
  document.getElementById('boat-people').innerHTML = '';

  // reset status text
  document.getElementById('status').textContent = 'Select passengers, then row across.';

  // re-render everything
  render();
}
function fatalCombo(arr){
  const s = new Set(arr);
  if(s.has('clue') && s.has('lilith') && !s.has('human')) return 'Clue killed Lilith! Never leave them alone.';
  if(s.has('lilith') && s.has('demure') && !s.has('human')) return 'Lilith and Demure had a fight! Never leave them alone.';
  return null;
}

function checkAllGroups(){
  const left = onBank('left');
  const right = onBank('right');
  const boat = [...state.boatPassengers];
  return fatalCombo(left) || fatalCombo(right) || fatalCombo(boat);
}

function togglePerson(id){
  if(state.moving) return;
  if(state.loc[id] !== state.boatSide) return;
  const idx = state.boatPassengers.indexOf(id);
  if(idx > -1){
    state.boatPassengers.splice(idx,1);
  } else {
    if(state.boatPassengers.length >= 2) return;
    state.boatPassengers.push(id);
  }
  render();
}

function rowBoat(){
  if(state.moving || state.tripsLeft <= 0 || state.boatPassengers.length === 0) return;
  state.moving = true;
  state.tripsLeft--;

  // move passengers out of bank into boat
  state.boatPassengers.forEach(id => { state.loc[id] = 'boat'; });

  // check left & right banks now (boat departed)
  const err = checkAllGroups();

  const destSide = state.boatSide === 'left' ? 'right' : 'left';

  animateBoat(destSide, () => {
    if(err){
      // put passengers back on origin bank visually, then game over
      state.boatPassengers.forEach(id => { state.loc[id] = state.boatSide; });
      state.boatPassengers = [];
      state.moving = false;
      render();
      showOverlay('💀 Disaster!', err);
      return;
    }

    // land passengers
    state.boatPassengers.forEach(id => { state.loc[id] = destSide; });
    state.boatSide = destSide;

    // check destination bank after landing
    const errAfter = checkAllGroups();
    state.boatPassengers = [];
    state.moving = false;
    render();

    if(errAfter){
      showOverlay('💀 Disaster!', errAfter);
      return;
    }

    const won = ['clue','lilith','demure'].every(id => state.loc[id] === 'right');
    if(won){ setTimeout(winGame, 400); return; }
    if(state.tripsLeft === 0){
      showOverlay('⏰ Out of trips!', 'You used all 5 trips but not everyone made it. Try a different strategy!');
    }
  });
}

function animateBoat(dest, cb){
  const boat = document.getElementById('boat');
  const sceneW = document.getElementById('scene').offsetWidth;
  const bankW = sceneW * 0.3;
  boat.style.transition = 'left 1s ease-in-out';
  boat.style.left = (dest === 'right' ? sceneW - bankW - 45 : bankW - 45) + 'px';
  setTimeout(cb, 1050);
}

function makePerson(id, side){
  const p = PEOPLE[id];
  const isRight = side === 'right';
  const inner = isRight
    ? `<span class="pname">${p.name}</span><span class="avatar${p.dancer?' human-dancer':''}">${p.emoji}</span>`
    : `<span class="avatar">${p.emoji}</span><span class="pname">${p.name}</span>`;
  const el = document.createElement('div');
  el.className = 'person';
  el.id = 'p-'+id;
  el.innerHTML = inner;
  el.onclick = () => togglePerson(id);
  return el;
}

function render(){
  const sceneW = document.getElementById('scene').offsetWidth;
  const bankW = sceneW * 0.3;
  const boat = document.getElementById('boat');

  if(!state.moving){
    boat.style.transition = 'none';
    boat.style.left = (state.boatSide === 'left' ? bankW - 45 : sceneW - bankW - 45) + 'px';
    setTimeout(() => boat.style.transition = 'left 1s ease-in-out', 50);
  }

  // rebuild bank person lists
  const leftEl = document.getElementById('left-people');
  const rightEl = document.getElementById('right-people');
  leftEl.innerHTML = '';
  rightEl.innerHTML = '';

  const leftBank = onBank('left');
  const rightBank = onBank('right');

  leftBank.forEach(id => {
    const el = makePerson(id, 'left');
    if(state.boatPassengers.includes(id)) el.classList.add('selected');
    leftEl.appendChild(el);
  });

  rightBank.forEach(id => {
    const el = makePerson(id, 'right');
    if(state.boatPassengers.includes(id)) el.classList.add('selected');
    rightEl.appendChild(el);
  });

  // boat passengers
  document.getElementById('boat-people').innerHTML =
    state.boatPassengers.map(id => `<span class="bp">${PEOPLE[id].emoji}</span>`).join('');

  // trip counter
  document.getElementById('trip-count').textContent = state.tripsLeft;

  // button
  const canRow = state.boatPassengers.length > 0 && state.tripsLeft > 0 && !state.moving;
  document.getElementById('btn-go').disabled = !canRow;
  const dir = state.boatSide === 'left' ? '→ right' : '← left';
  document.getElementById('btn-go').textContent = `Row ${dir} ⛵`;

  // info text
  const sel = document.getElementById('selection-info');
  if(state.boatPassengers.length === 0){
    const here = state.boatSide === 'left' ? leftBank : rightBank;
    sel.textContent = here.length > 0
      ? `Click up to 2 people on the ${state.boatSide} bank to board`
      : 'Nobody here — you must row back empty!';
    if(here.length === 0) document.getElementById('btn-go').disabled = false;
  } else {
    sel.textContent = `In boat: ${state.boatPassengers.map(id=>PEOPLE[id].name).join(' & ')}`;
  }

  const won = ['clue','lilith','demure'].every(id => state.loc[id] === 'right');
  document.getElementById('status').textContent = won
    ? '🎉 Everyone is at the party!'
    : state.tripsLeft === 0 ? 'No trips left!'
    : `Boat is on the ${state.boatSide} bank.`;
}

function showOverlay(title, msg){
  document.getElementById('overlay-title').textContent = title;
  document.getElementById('overlay-msg').textContent = msg;
  document.getElementById('overlay').classList.add('show');
}
function closeOverlay(){
  document.getElementById('overlay').classList.remove('show');
  const won = ['clue','lilith','demure'].every(id => state.loc[id] === 'right');
  if(!won) resetGame();
}

function winGame(){
  document.getElementById('win-banner').classList.add('show');
  startConfetti();
}

let confettiAnim;
const colors = ['#ffd700','#ff6b6b','#4ecdc4','#a55eea','#fd9644','#26de81'];
function startConfetti(){
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const pieces = Array.from({length:140}, () => ({
    x:Math.random()*canvas.width, y:Math.random()*canvas.height - canvas.height,
    w:8+Math.random()*8, h:4+Math.random()*4,
    color:colors[Math.floor(Math.random()*colors.length)],
    rot:Math.random()*360, vx:(Math.random()-0.5)*3, vy:2+Math.random()*3, vr:(Math.random()-0.5)*6
  }));
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle=p.color; ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h); ctx.restore();
      p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr;
      if(p.y>canvas.height) p.y=-20;
    });
    confettiAnim = requestAnimationFrame(draw);
  }
  draw();
}
function stopConfetti(){
  if(confettiAnim) cancelAnimationFrame(confettiAnim);
  const c = document.getElementById('confetti-canvas');
  c.getContext('2d').clearRect(0,0,c.width,c.height);
}

initState(); render();
window.addEventListener('resize', render);
</script>
</body>
</html>
